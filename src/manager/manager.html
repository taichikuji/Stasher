<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="color-scheme" content="light dark">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Stasher Dashboard</title>
  <script src="theme-init.js"></script>
  <link rel="stylesheet" type="text/css" href="manager.css">
</head>
<body>
  <svg class="icon-sprite" aria-hidden="true">
    <symbol id="icon-chevron-down" viewBox="0 0 24 24">
      <path d="m6 9 6 6 6-6" />
    </symbol>
    <symbol id="icon-chevron-right" viewBox="0 0 24 24">
      <path d="m9 18 6-6-6-6" />
    </symbol>
    <symbol id="icon-pencil" viewBox="0 0 24 24">
      <path d="M12 20h9" />
      <path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z" />
    </symbol>
    <symbol id="icon-check" viewBox="0 0 24 24">
      <path d="m5 12 4 4L19 6" />
    </symbol>
    <symbol id="icon-x" viewBox="0 0 24 24">
      <path d="M18 6 6 18M6 6l12 12" />
    </symbol>
    <symbol id="icon-trash" viewBox="0 0 24 24">
      <path d="M3 6h18M8 6V4h8v2m3 0-1 14H6L5 6m5 4v6m4-6v6" />
    </symbol>
  </svg>

  <header class="header">
    <h1>
      <svg class="header-icon" aria-hidden="true" viewBox="5 6 110 110" fill="currentColor">
        <path d="M35 48a6 6 0 1 0 12 0 6 6 0 0 0-12 0Zm44 6a6 6 0 1 1 0-12 6 6 0 0 1 0 12Zm-15 3.465V61c0 .81.812 2 2.5 2s2.5-1.19 2.5-2a4 4 0 0 1 8 0c0 5.818-5.008 10-10.5 10-2.38 0-4.67-.786-6.5-2.15A10.919 10.919 0 0 1 53.5 71c-3.197 0-6.134-1.37-8.094-3.627C43.928 65.672 43 63.45 43 61a4 4 0 0 1 8 0c0 1.264 1.38 2 2.5 2 1.688 0 2.5-1.19 2.5-2v-3.535A4 4 0 0 1 58 50h4a4 4 0 0 1 2 7.465Z" />
        <path fill-rule="evenodd" d="M10.034 15.873c.216 12.365 1.436 20.71 5.28 29.222a37.753 37.753 0 0 0-1.273 8.088 4.002 4.002 0 0 0-1.278 7.76l1.712.622a39.117 39.117 0 0 0 2.285 8.638l-.628.276a4 4 0 0 0 3.228 7.32l1.14-.502a37.027 37.027 0 0 0 3.905 4.828l-1.552 1.552a4 4 0 0 0 5.657 5.657l.506-.506c-.658 12.475 14.165 17.55 24.11 18.76A10.955 10.955 0 0 0 60 110c2.601 0 4.991-.903 6.874-2.412 9.968-1.213 24.97-6.379 24.099-18.948l.693.694a4 4 0 1 0 5.657-5.657l-1.642-1.642a37.016 37.016 0 0 0 3.86-4.798l1.275.562a4 4 0 1 0 3.228-7.32l-.778-.343a39.08 39.08 0 0 0 2.249-8.503l1.899-.69a4 4 0 0 0-1.455-7.76 37.854 37.854 0 0 0-1.233-7.938c3.876-8.543 5.104-16.902 5.32-29.311.057-3.285-2.615-5.983-5.894-5.79-9.448.558-17.474 2.705-23.95 6.595C73.942 13.709 67.018 12 60 12c-6.98 0-13.867 1.692-20.1 4.69-6.48-3.898-14.513-6.049-23.971-6.607-3.28-.193-5.952 2.505-5.895 5.79Zm8.06 2.402c.204 6.481.754 11.542 1.905 16.086 3.053-4.94 7.122-9.29 11.856-12.808-3.865-1.65-8.423-2.758-13.76-3.279ZM70.996 98.72c2.475-.616 4.7-1.436 6.556-2.424 3.158-1.682 4.626-3.432 5.176-5.12-3.912 1.808-8.116 3.107-12.449 3.9.434 1.136.685 2.362.718 3.644ZM60 88c8.927 0 17.563-2.379 24.271-6.806a4.002 4.002 0 0 1 5.598-4.656 29.22 29.22 0 0 0 2.224-2.627 4 4 0 0 1-1.558-5.017c.925-2.096 3.362-2.89 5.403-1.99.331-.875.626-1.78.882-2.716a4 4 0 0 1-.6-7.685l1.77-.644C98.443 35.858 79.154 20 60 20c-19.124 0-38.411 15.82-37.991 35.794l1.947.709a4 4 0 0 1-.768 7.714c.26.95.561 1.867.9 2.754 2.09-.921 4.578-.288 5.553 1.923a4 4 0 0 1-1.68 5.09c.694.919 1.438 1.79 2.227 2.614a4.002 4.002 0 0 1 5.69 4.693C42.564 85.656 51.138 88 60 88Zm-10.28 7.075a10.962 10.962 0 0 0-.716 3.645c-2.475-.616-4.7-1.436-6.556-2.424-3.158-1.682-4.626-3.432-5.176-5.12 3.912 1.808 8.116 3.107 12.449 3.9Zm52.266-76.74c-.204 6.506-.758 11.58-1.918 16.136-3.042-4.956-7.107-9.323-11.842-12.857 3.865-1.65 8.423-2.758 13.76-3.278ZM63 99a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" clip-rule="evenodd" />
      </svg>Stashes
    </h1>
    <div class="controls" role="toolbar" aria-label="Stash actions">
      <button id="themeToggleBtn" aria-label="Toggle dark mode">🐈‍⬛</button>
      <button id="exportBtn">Export</button>
      <input type="file" id="importFile" accept=".json" class="visually-hidden">
      <button id="importBtn">Import</button>
      <span class="toolbar-separator" aria-hidden="true"></span>
      <button id="deleteAllBtn" class="danger">Delete All Stashes</button>
    </div>
  </header>

  <main id="stash-container" aria-live="polite">
  </main>

  <div id="undo-toast" class="undo-toast hidden" role="alert">
    <span id="undo-msg">Item deleted</span>
    <button id="undo-btn">UNDO</button>
    <button id="close-toast" class="icon-btn" aria-label="Dismiss notification">
      <svg class="button-icon" aria-hidden="true"><use href="#icon-x" /></svg>
    </button>
  </div>

  <div id="info-toast" class="undo-toast hidden" role="status">
    <span id="info-msg"></span>
    <button id="close-info-toast" class="icon-btn" aria-label="Dismiss notification">
      <svg class="button-icon" aria-hidden="true"><use href="#icon-x" /></svg>
    </button>
  </div>

  <!-- Confirmation modal (replaces native confirm/alert) -->
  <div id="confirm-modal" class="modal-overlay hidden" role="dialog" aria-modal="true" aria-labelledby="confirm-title">
    <div class="modal-box">
      <p id="confirm-title"></p>
      <div class="modal-actions">
        <button id="confirm-cancel" class="secondary">Cancel</button>
        <button id="confirm-ok" class="danger">Delete All Stashes</button>
      </div>
    </div>
  </div>

  <script src="manager.js"></script>
</body>
</html>
